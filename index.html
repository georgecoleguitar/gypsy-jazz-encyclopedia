<style>

  }

  /* HEADER */

    pointer-events: none;

    color: var(--sepia);
    font-family: 'Crimson Pro', serif;

    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px 60px;

  .card {
    background: var(--parchment);
    border: 1px solid rgba(122,92,46,0.3);
    border-top: 3px solid var(--gold);

  @keyframes fadeUp {

    background: rgba(122,92,46,0.1);
    border: 1px solid rgba(122,92,46,0.2);

    font-family: 'Crimson Pro', serif;

    bottom: 14px; right: 16px;

    color: var(--gold);

    font-style: italic;
    color: var(--warm-gray);
    font-size: 0.88rem;

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,15,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;

  .modal {
    background: var(--cream);
    border: 1px solid var(--gold);
    border-top: 4px solid var(--gold);

    top: 16px; right: 20px;
    background: none; border: none;

  .modal-name { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; color: var(--dark-sepia); line-height: 1.1; }

  .modal-divider { height: 1px; background: linear-gradient(90deg, var(--gold), rgba(200,151,42,0.1)); margin-bottom: 20px; }
  .modal-bio { font-size: 1.05rem; line-height: 1.82; color: #2c1f0a; font-weight: 300; }
  .modal-bio p + p { margin-top: 1em; }
  .modal-tags { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 7px; }
</style>
</head>

<script>
const guitarists = [
  {
    name: "Django Reinhardt",
    dates: "1910 – 1953",
    nationality: "Belgian-Romani",
    era: "Founding Era",
    tags: ["Quintette du Hot Club", "Jazz Manouche", "Improvisation", "QHCF"],
    bio: "Born Jean Reinhardt on January 23, 1910, in a Romani caravan parked in Liberchies, Belgium, Django was the child of a traveling entertainer father and a mother of Romani-Manouche descent. The family drifted between Belgium and the outskirts of Paris, living in the encampments of Romani caravans at the city\'s edge — a world apart from bourgeois France, self-contained and musical to its core. Django taught himself banjo and then guitar as a small child, absorbing music by ear with the total immersion that characterized the Romani oral tradition. By his early teens he was already playing in the dance halls and cafes of Paris, earning money to help his family.\\n\\nThen, on the night of November 2, 1928, a candle ignited the cellulose flowers that lined the interior of his caravan, and the fire spread with terrible speed. Django\'s left hand was catastrophically burned — the ring and little fingers permanently fused into a single gnarled mass, the others severely damaged. Doctors told him he would never play again. He was eighteen years old.\\n\\nWhat happened next is one of music\'s most extraordinary stories of reinvention. Confined to bed for over a year during his recovery, Django taught himself an entirely new technique, using only the index and middle fingers of his scarred left hand for fretting, while the fused fingers — held rigid — were repurposed as a kind of barre for chord voicings. The limitation became a signature: his chords were unusual, his phrasing idiosyncratic, his octave passages and chromatic runs unlike anything anyone had heard before. He did not compensate for his injury — he transformed it into an identity.\\n\\nIn 1934, Django met violinist Stéphane Grappelli at the Hôtel Claridge in Paris, and the Quintette du Hot Club de France was born. The ensemble — two rhythm guitars, a bass guitar, violin, and lead guitar — was without precedent in jazz. There were no horns, no piano, no drums. The music was entirely string-driven, light and airborne yet rhythmically propulsive, a fusion of American swing with Romani melody and European café music. Django was its irreplaceable center. His tone on a Selmer-Maccaferri guitar — warm, piercing, singing — was unlike any electric guitar sound of the era, and his improvisational invention was inexhaustible. Recordings such as \'Minor Swing,\' \'Nuages,\' \'Djangology,\' \'Daphne,\' \'Belleville,\' and \'Swing 42\' became the permanent repertoire of a new genre that did not yet have a name.\\n\\nHe was not simply a technical marvel, though he was certainly that. What set Django apart was melodic genius — an ability to construct solos of perfect shape and inevitability, full of surprises that sounded, in retrospect, inevitable. He was also deeply blues-influenced, having absorbed American jazz recordings voraciously, and this blues feeling — the bent notes, the smears, the expressive vibrato — gave his music an emotional directness that transcended genre. Duke Ellington, who toured with Django in 1946, said he had never heard anything like it. Coleman Hawkins, Benny Carter, and other American masters who recorded with him in Paris were visibly awed.\\n\\nThe German occupation of Paris during World War II placed Django and the Romani community in mortal danger — the Nazis were systematically exterminating the Romani people alongside Jewish Europeans. Django navigated the occupation with characteristic audacity, continuing to perform and record even as his community suffered, and making at least one attempted escape from occupied France. The recordings he made during the war years, including the haunting \'Nuages,\' became anthems of hope and melancholy for a city under oppression.\\n\\nIn his final years Django became fascinated by bebop and the electric guitar, shedding much of the Hot Club sound in pursuit of something harder and more angular. His late recordings — made with young Paris beboppers who idolized Charlie Parker — reveal a player still evolving, still restless, still ahead of his time. He died of a cerebral hemorrhage on May 16, 1953, while fishing near his home in Samois-sur-Seine. He was forty-three years old. The tradition he founded now spans the globe, with festivals, camps, schools, and thousands of devoted practitioners on every continent — all of them, in one way or another, his children."
  },
  {
    name: "Bireli Lagrène",
    dates: "1966 – present",
    nationality: "French-Romani",
    era: "Modern Era",
    tags: ["Child Prodigy", "Fusion", "Bebop", "Django Tribute"],
    bio: "Born on September 4, 1966, in Souffelweyersheim, Alsace, into a large Romani-Manouche family where music was inseparable from daily life, Biréli Lagrène was playing Django\'s music with adult fluency before he was ten years old. The story of his emergence is almost mythological: a Romani child from the caravans of Alsace, absorbing the tradition through sheer immersion, producing solos of mature beauty before he had any formal musical education at all. His father played guitar; so did his uncles and cousins. The tradition was passed hand to hand, note by note, in the way it had always been transmitted.\\n\\nAt age twelve he was recorded for what would become the album Routes to Django, released on the German MPS label in 1980. The effect on the international gypsy jazz community was seismic. Here was a child playing with the tone, timing, and melodic authority of a seasoned master — not imitating Django so much as channeling him, playing from the same deep well of the tradition. European jazz critics fell over themselves to describe what they were hearing. The Django festival at Samois-sur-Seine, which had been searching for a worthy heir to the tradition, found it in this twelve-year-old from Alsace.\\n\\nWhat distinguished Lagrène from every other Django acolyte, then and since, was that he never stopped growing. Where others found a home in the tradition and settled there, Lagrène was constitutionally restless. By his late teens he was already exploring jazz fusion, electric guitar, and the music of Jaco Pastorius, with whom he eventually recorded in 1986 — a collaboration that produced the album Stuttgart Aria and marked a decisive turn toward electric jazz-rock. He absorbed bebop, worked with fusion musicians, studied the harmonic language of post-war jazz, and emerged in his twenties as a complete musician who could play at the highest level in almost any jazz context.\\n\\nYet the manouche tradition remained his deepest root, and he has returned to it throughout his career with recordings that remind listeners why he was always considered something exceptional. His Gypsy Project albums, recorded in the early 2000s with violinist Florin Niculescu and other European masters, are widely regarded as among the finest gypsy jazz recordings of the modern era — combining technical perfection with a burning emotional commitment that purely academic players rarely achieve. His live performances continue to draw gasps: the right-hand velocity, the tone, the way long melodic phrases unfurl with the ease of breathing. He is, by most serious reckoning, the greatest living practitioner of the tradition Django created."
  },
  {
    name: "Stochelo Rosenberg",
    dates: "1968 – present",
    nationality: "Dutch-Romani",
    era: "Modern Era",
    tags: ["Rosenberg Trio", "Speed", "Hot Club Style", "Netherlands"],
    bio: "Born in 1968 in the Netherlands into the sprawling Rosenberg Romani musical clan, Stochelo Rosenberg grew up in a world where playing guitar was as natural and necessary as speech. The Rosenbergs were — and remain — one of the great musical families of the European Romani world, producing guitarists, bassists, and rhythm players across multiple generations with a consistency that suggests the music is literally in the blood. Stochelo absorbed the Django tradition from childhood, learning from elders and cousins in the oral way, without notation or formal instruction, simply by listening and playing until the music became his own.\\n\\nWith his cousins Nous\'che Rosenberg on rhythm guitar and Nonnie Rosenberg on bass guitar, he formed the Rosenberg Trio in the late 1980s, and the group\'s impact on the gypsy jazz world was immediate and lasting. Their first recordings — released on the Polygram-affiliated label and later on their own Djaz imprint — circulated throughout Europe and beyond, introducing a generation of listeners to the Hot Club style played with a ferocity and purity that few had heard since Django himself. The Trio did not modernize or dilute the tradition; they simply played it better than almost anyone alive.\\n\\nStochelo\'s playing is a study in what absolute stylistic commitment can yield. He made a choice, early and deliberately, to devote himself entirely to the Django idiom rather than expanding into other forms of jazz or fusion, and the depth he achieved through that focus is extraordinary. His right-hand technique — a powerful, diving rest-stroke that extracts a warm, percussive tone from his Favino guitar — is considered the gold standard of the manouche picking style. His left-hand vocabulary, built from years of total immersion in the tradition, is comprehensive to the point of inexhaustibility: every standard in the repertoire explored from every angle, every substitution and melodic approach internalized. His recording of \'Seresta,\' a dreamy waltz by Django, is among the most beautiful things in the gypsy jazz canon.\\n\\nHis influence on younger players has been enormous — perhaps second only to Django himself in terms of the guitarists who cite him as the primary model for their technique and conception."
  },
  {
    name: "Fapy Lafertin",
    dates: "1950 – present",
    nationality: "Belgian-Romani",
    era: "Post-Django Era",
    tags: ["Belgian Tradition", "Vintage Style", "Composer"],
    bio: "One of the most important bridges between Django's generation and the modern revival, Fapy Lafertin was born in Ghent and grew up immersed in the Belgian Romani guitar tradition. His playing captures the dark, smoky lyricism of Django's 1940s recordings with an authenticity that goes beyond imitation — it is a living transmission from the same cultural root.\n\nLafertin has been a tireless educator and ambassador for the tradition, collaborating with American swing revivalists and European jazz institutions alike. His compositions display an impressive melodic gift, and his tone on recordings such as 'Fais-Moi Confiance' reveals a depth of feeling that places him firmly among the masters."
  },
  {
    name: "Dorado Schmitt",
    dates: "1957 – present",
    nationality: "French-Romani",
    era: "Modern Era",
    tags: ["Schmitt Family", "French Tradition", "Composer", "Educator"],
    bio: "A cornerstone of the French gypsy jazz tradition and patriarch of one of its most celebrated musical dynasties. Dorado Schmitt grew up in the Romani encampments around Strasbourg and Paris, learning guitar in the time-honored manouche way — by ear, by imitation, and by playing alongside elders. His style is rooted in the melodic vocabulary of Django but inflected with a distinctively French lyrical warmth.\n\nHis son Samson Schmitt has become a celebrated guitarist in his own right, and the two often perform together, creating a living illustration of the oral tradition in action. Dorado has recorded prolifically and performed worldwide, carrying the flame of authentic manouche music with grace and humility."
  },
  {
    name: "Samson Schmitt",
    dates: "1982 – present",
    nationality: "French-Romani",

    tags: ["Schmitt Family", "New Generation", "Virtuoso"],
    bio: "Son of Dorado Schmitt and heir to one of the great names in manouche guitar, Samson Schmitt has developed into a fully independent voice who honors the tradition while expanding it with contemporary jazz harmony and a restless improvisational spirit. His technique is clean, his lines flow with an ease that belies their complexity, and his musical maturity arrived early.\n\nHe performs frequently in duo with his father as well as leading his own projects, and has collaborated with Biréli Lagrène and international jazz artists. Samson represents the healthiest possible outcome for a deep tradition: deep respect married to genuine originality."
  },
  {
    name: "Jimmy Rosenberg",
    dates: "1980 – present",
    nationality: "Dutch-Romani",
    era: "Contemporary Era",
    tags: ["Rosenberg Family", "Prodigy", "Netherlands"],
    bio: "A prodigy of almost frightening ability who astonished the gypsy jazz world as a child and went on to carve a turbulent but brilliant career. Jimmy Rosenberg — cousin to Stochelo — was filmed as a young boy displaying a right-hand technique of extraordinary velocity and a left-hand melodic invention already beyond his years. The documentary 'The Angel of Amsterdam' brought him international attention and cult status.\n\nHis personal life has been marked by significant difficulties, but at his best Jimmy Rosenberg plays with an emotional directness and bluesy intensity that distinguishes him even within a family of exceptional guitarists. His recordings from the 1990s and early 2000s remain revered documents of his talent."
  },
  {
    name: "Tchavolo Schmitt",
    dates: "1954 – present",
    nationality: "French-Romani",
    era: "Post-Django Era",
    tags: ["French Tradition", "Manouche Elder", "Lyrical Style"],
    bio: "Born Marcel Schmitt in 1954 in the Romani community of Forbach, a small city in the Moselle region of northeastern France close to the German border, Tchavolo Schmitt — the name Tchavolo is a traditional Romani nickname — grew up in a world where the guitar was the central communal instrument and Django Reinhardt was not a distant legend but a living presence in the memory of the community\'s elders. He learned guitar the way all the great manouche players learned it: by ear, by watching, by playing alongside older musicians from childhood, the tradition passing from hand to hand without scores or formal lessons.\\n\\nCrucially, Tchavolo was old enough to play alongside musicians who had known and performed with Django himself. He played with Joseph Reinhardt, Django\'s younger brother, absorbing something of the first generation\'s feel and vocabulary in a direct transmission that is no longer possible for younger players. This historical connection gives his playing a quality that is difficult to name but immediately audible — a certain ease with the style, a naturalness in the phrasing that comes not from study but from lived immersion across a lifetime.\\n\\nHis recordings, particularly those made for the French jazz label Dreyfus Jazz in the 2000s, are among the most musically satisfying documents of the contemporary manouche tradition. Albums such as Manoir de Mes Rêves and Sinti reveal a guitarist of rare vocal quality — his single-note lines sing with a warmth and expressiveness that recall the human voice more than most instrumentalists ever achieve. His sense of time is deep and relaxed, his vibrato distinctive and personal, his chord work harmonically rich without ever becoming academic. He has performed and recorded with Stochelo Rosenberg, Dorado Schmitt, and many others, and his collaborations with younger players serve as masterclasses in how the tradition should feel when it has truly been absorbed."
  },
  {

// Deduplicate
const seen = new Set();
const uniqueGuitarists = guitarists.filter(g => {
  const key = g.name + g.dates;
  if (seen.has(key)) return false;
  seen.add(key); return true;
});

// Sort alphabetically
uniqueGuitarists.sort((a,b) => a.name.localeCompare(b.name));

let activeEra = 'All';
let searchTerm = '';

function getEras() {
  const order = ['Founding Era','Post-Django Era','Modern Era','Contemporary Era'];
  const eras = [...new Set(uniqueGuitarists.map(g => g.era))];
  return ['All', ...order.filter(e => eras.includes(e))];
}

function buildEraFilters() {
  const container = document.getElementById('eraFilters');
  getEras().forEach(era => {
    const btn = document.createElement('button');
    btn.className = 'era-btn' + (era === 'All' ? ' active' : '');
    btn.textContent = era;
    btn.onclick = () => {
      activeEra = era;
      document.querySelectorAll('.era-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCards();
    };
    container.appendChild(btn);
  });
}

function filterCards() {
  searchTerm = document.getElementById('searchInput').value.toLowerCase();
  renderCards();
}

function renderCards() {
  const grid = document.getElementById('grid');
  const filtered = uniqueGuitarists.filter(g => {
    const eraMatch = activeEra === 'All' || g.era === activeEra;
    const searchMatch = !searchTerm ||
      g.name.toLowerCase().includes(searchTerm) ||
      g.nationality.toLowerCase().includes(searchTerm) ||
      g.tags.some(t => t.toLowerCase().includes(searchTerm)) ||
      g.bio.toLowerCase().includes(searchTerm);
    return eraMatch && searchMatch;
  });

  document.getElementById('resultsInfo').textContent =
    `${filtered.length} ${filtered.length === 1 ? 'guitarist' : 'guitarists'} found`;

  grid.innerHTML = '';
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">No guitarists match your search. <em>Cherchez encore…</em></div>';
    return;
  }

  filtered.forEach((g, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${i * 0.045}s`;
    card.innerHTML = `
      <div class="card-era">${g.era}</div>
      <div class="card-name">${g.name}</div>
      <div class="card-dates">${g.dates}</div>
      <div class="card-nationality">${g.nationality}</div>
      <div class="card-divider"></div>
      <div class="card-bio">${g.bio.split('\n\n')[0]}</div>
      <div class="card-tags">${g.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <span class="corner-ornament">♦</span>
    `;
    card.onclick = () => openModal(g);
    grid.appendChild(card);
  });
}

function openModal(g) {
  const content = document.getElementById('modalContent');
  const paras = g.bio.split('\n\n').map(p => `<p>${p}</p>`).join('');
  content.innerHTML = `
    <div class="modal-era">${g.era}</div>
    <div class="modal-name">${g.name}</div>
    <div class="modal-dates">${g.dates}</div>
    <div class="modal-nationality">${g.nationality}</div>
    <div class="modal-divider"></div>
    <div class="modal-bio">${paras}</div>
    <div class="modal-tags">${g.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModalDirect(); });

buildEraFilters();
renderCards();
</script>
